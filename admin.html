<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>ETETT1309 Gallery Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #131313;
      --surface: #0e0e0e;
      --surface-high: #1c1b1b;
      --text: #e5e2e1;
      --muted: #d0c5af;
      --dim: #99907c;
      --line: #4d4635;
      --primary: #f2ca50;
      --on-primary: #241a00;
      --error: #ffb4ab;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      background: var(--background);
      color: var(--text);
      font-family: "Noto Sans KR", "Manrope", system-ui, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)' opacity='.8'/%3E%3C/svg%3E");
    }

    a { color: inherit; }
    .wrap {
      width: min(760px, calc(100% - 36px));
      margin: 0 auto;
      padding: 64px 0;
    }

    .brand {
      color: var(--primary);
      font-family: "Playfair Display", serif;
      font-size: 24px;
      margin-bottom: 54px;
    }

    h1 {
      margin: 0 0 18px;
      color: var(--primary);
      font-family: "Playfair Display", serif;
      font-size: clamp(42px, 9vw, 74px);
      font-weight: 400;
      line-height: 1;
    }

    p {
      color: var(--muted);
      line-height: 1.75;
      word-break: keep-all;
    }

    .label {
      font-family: "Space Mono", monospace;
      font-size: 12px;
      line-height: 1.4;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    form {
      margin-top: 38px;
      border: 1px solid var(--line);
      background: var(--surface);
      padding: 34px;
      display: grid;
      gap: 22px;
    }

    label {
      display: grid;
      gap: 10px;
      color: var(--primary);
    }

    input,
    textarea {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      font: inherit;
      padding: 12px 0;
      outline: 0;
    }

    textarea { min-height: 82px; resize: vertical; }
    input:focus,
    textarea:focus { border-color: var(--primary); }

    .file {
      border: 1px dashed var(--line);
      padding: 18px;
      background: var(--surface-high);
    }

    button {
      min-height: 52px;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: var(--on-primary);
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      cursor: wait;
      opacity: .55;
    }

    .note,
    .status {
      border: 1px solid var(--line);
      padding: 18px;
      background: rgba(28, 27, 27, .72);
    }

    .status {
      min-height: 58px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .status.error { color: var(--error); }
    .status.ok { color: var(--primary); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">ETETT1309</div>
    <p class="label" style="color: var(--primary);">Private Uploader</p>
    <h1>Gallery Upload</h1>
    <p>GitHub 토큰을 사용해 사진을 저장소에 올리고 갤러리 목록을 자동으로 갱신합니다. 토큰은 이 페이지에서만 사용하며 서버에 저장하지 않습니다.</p>

    <div class="note">
      <p style="margin: 0;">권장 토큰 권한: 이 저장소에 대한 Contents 읽기/쓰기 권한. 업로드 후 GitHub Pages 반영까지는 보통 잠깐 기다려야 합니다.</p>
    </div>

    <form id="upload-form">
      <label class="label">
        GitHub Token
        <input id="token" type="password" autocomplete="off" placeholder="github_pat_... 또는 ghp_..." required>
      </label>

      <label class="label">
        Photo
        <input class="file" id="photo" type="file" accept="image/jpeg,image/png,image/webp,image/gif" required>
      </label>

      <label class="label">
        File Name
        <input id="filename" type="text" placeholder="work-01.jpg">
      </label>

      <label class="label">
        Title
        <input id="title" type="text" placeholder="NIKKE / Studio" required>
      </label>

      <label class="label">
        Meta
        <input id="meta" type="text" placeholder="Cosplay / Seoul / 2026">
      </label>

      <label class="label">
        Alt Text
        <textarea id="alt" placeholder="사진 설명"></textarea>
      </label>

      <button class="label" id="submit" type="submit">Upload To Gallery</button>
      <div class="status" id="status">대기 중</div>
    </form>
  </main>

  <script>
    const OWNER = "xxoxx1309-byte";
    const REPO = "etett1309";
    const BRANCH = "main";
    const API = "https://api.github.com";
    const GALLERY_PATH = "assets/gallery.js";

    const form = document.getElementById("upload-form");
    const statusBox = document.getElementById("status");
    const submit = document.getElementById("submit");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("업로드 준비 중...");
      submit.disabled = true;

      try {
        const token = document.getElementById("token").value.trim();
        const file = document.getElementById("photo").files[0];
        const title = document.getElementById("title").value.trim();
        const meta = document.getElementById("meta").value.trim();
        const alt = document.getElementById("alt").value.trim() || title;
        const filename = normalizeFilename(document.getElementById("filename").value, file);
        const imagePath = `assets/gallery/${filename}`;

        if (!token || !file || !title) throw new Error("토큰, 사진, 제목은 필수입니다.");
        if (file.size > 8 * 1024 * 1024) throw new Error("GitHub 업로드 안정성을 위해 8MB 이하 이미지로 줄여주세요.");

        setStatus("이미지를 GitHub 저장소에 업로드하는 중...");
        await putFile(token, imagePath, await fileToBase64(file), `Upload gallery image ${filename}`);

        setStatus("갤러리 목록을 불러오는 중...");
        const current = await getFile(token, GALLERY_PATH);
        const items = parseGallery(current.text);
        items.unshift({ src: imagePath, title, meta, alt });

        setStatus("갤러리 목록을 업데이트하는 중...");
        const nextGallery = `window.PORTFOLIO_ITEMS = ${JSON.stringify(items, null, 2)};\n`;
        await putFile(token, GALLERY_PATH, textToBase64(nextGallery), `Update gallery list`, current.sha);

        setStatus("완료! GitHub Pages 빌드가 끝나면 메인 페이지에 반영됩니다.", "ok");
        form.reset();
      } catch (error) {
        setStatus(error.message || String(error), "error");
      } finally {
        submit.disabled = false;
      }
    });

    async function githubFetch(token, path, options = {}) {
      const response = await fetch(`${API}${path}`, {
        ...options,
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${token}`,
          "X-GitHub-Api-Version": "2022-11-28",
          ...(options.headers || {})
        }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.message || `GitHub API 오류: ${response.status}`);
      }
      return data;
    }

    async function getFile(token, path) {
      const data = await githubFetch(token, `/repos/${OWNER}/${REPO}/contents/${encodeURIComponentPath(path)}?ref=${BRANCH}`);
      return {
        sha: data.sha,
        text: decodeBase64Text(data.content || "")
      };
    }

    async function putFile(token, path, content, message, sha) {
      const body = { message, content, branch: BRANCH };
      if (sha) body.sha = sha;
      return githubFetch(token, `/repos/${OWNER}/${REPO}/contents/${encodeURIComponentPath(path)}`, {
        method: "PUT",
        body: JSON.stringify(body)
      });
    }

    function parseGallery(text) {
      const match = text.match(/window\.PORTFOLIO_ITEMS\s*=\s*([\s\S]*?);\s*$/);
      if (!match) return [];
      try {
        const parsed = JSON.parse(match[1]);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function normalizeFilename(value, file) {
      const ext = (file.name.match(/\.[a-z0-9]+$/i) || [".jpg"])[0].toLowerCase();
      const base = (value || file.name.replace(/\.[^.]+$/, ""))
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9가-힣._-]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return base.endsWith(ext) ? base : `${base || `work-${Date.now()}`}${ext}`;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(",")[1]);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function textToBase64(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
      return btoa(binary);
    }

    function decodeBase64Text(content) {
      const clean = content.replace(/\s/g, "");
      const binary = atob(clean);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    function encodeURIComponentPath(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function setStatus(message, kind = "") {
      statusBox.className = `status ${kind}`.trim();
      statusBox.textContent = message;
    }
  </script>
</body>
</html>
